<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0" />
    <title>Liquid Glass Shape Tool</title>
    <meta
      name="description"
      content="A browser tool for creating liquid glass effects from SVG shapes with adjustable refraction, blur, edge highlights, and custom backgrounds."
    />
    <meta name="keywords" content="liquid glass, svg, webgl, glass effect, shape tool, refraction, blur" />
    <meta name="author" content="3524671481-ui" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#050711" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Liquid Glass Shape Tool" />
    <meta property="og:title" content="Liquid Glass Shape Tool" />
    <meta
      property="og:description"
      content="Import SVG shapes and turn them into adjustable liquid glass elements over image or video backgrounds."
    />
    <meta property="og:image" content="assets/bg.png" />
    <meta property="og:url" content="https://3524671481-ui.github.io/liquid-glass-shape-tool/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Liquid Glass Shape Tool" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Liquid Glass Shape Tool" />
    <meta name="twitter:description" content="Import SVG shapes and turn them into adjustable liquid glass elements." />
    <meta name="twitter:image" content="assets/bg.png" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='36' fill='%23f7f7f4'/><circle cx='50' cy='50' r='35' fill='none' stroke='%23111' stroke-width='2'/></svg>"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="glass.css" />
    <link rel="stylesheet" href="controls.css" />
  </head>
  <body>
    <canvas id="fluid-background-canvas" aria-hidden="true"></canvas>

    <button id="mobile-controls-toggle" class="mobile-controls-toggle" aria-label="切换设置面板">
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
    </button>

    <div id="glass-controls-container" class="glass-controls">
      <div id="controls-content" class="controls-content">
        <div class="settings-kicker">POINT / GLASS TOOL</div>

        <section class="settings-section">
          <div class="section-index">01</div>
          <div class="section-body">
            <h4>导入</h4>
            <div class="control-group svg-import-group">
              <label for="svgFileInput">导入 SVG 图形</label>
              <input id="svgFileInput" type="file" accept=".svg,image/svg+xml" />
              <div id="svgImportStatus" class="svg-import-status">
                选择 SVG 文件后，会直接使用 SVG 的透明形状生成液态玻璃按钮。
              </div>
            </div>

            <div class="control-group svg-import-group">
              <label for="backgroundFileInput">替换背景</label>
              <input id="backgroundFileInput" type="file" accept="image/*,video/*" />
              <div class="svg-import-status">支持图片或视频；未选择时使用默认 bg.png 背景。</div>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-index">02</div>
          <div class="section-body">
            <h4>边缘</h4>
            <div class="control-group">
              <label>边缘折射强度 <span class="control-value" id="edgeValue">0.077</span></label>
              <input type="range" id="edgeIntensity" min="0" max="0.1" step="0.001" value="0.077" />
            </div>

            <div class="control-group">
              <label>边缘高光强度 <span class="control-value" id="rimValue">0.2</span></label>
              <input type="range" id="rimIntensity" min="0" max="0.2" step="0.001" value="0.2" />
            </div>

            <div class="control-group">
              <label>中心扭曲强度 <span class="control-value" id="baseValue">0.01</span></label>
              <input type="range" id="baseIntensity" min="0" max="0.05" step="0.001" value="0.01" />
            </div>

            <div class="control-group">
              <label>边缘影响范围 <span class="control-value" id="edgeDistValue">0.15</span></label>
              <input type="range" id="edgeDistance" min="0.05" max="0.5" step="0.01" value="0.15" />
            </div>

            <div class="control-group">
              <label>高光影响范围 <span class="control-value" id="rimDistValue">0.4</span></label>
              <input type="range" id="rimDistance" min="0.1" max="2.0" step="0.05" value="0.4" />
            </div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-index">03</div>
          <div class="section-body">
            <h4>内部</h4>
            <div class="control-group">
              <label>中心影响范围 <span class="control-value" id="baseDistValue">0.1</span></label>
              <input type="range" id="baseDistance" min="0.05" max="0.3" step="0.01" value="0.1" />
            </div>

            <div class="control-group">
              <label>角落增强 <span class="control-value" id="cornerValue">0.02</span></label>
              <input type="range" id="cornerBoost" min="0" max="0.1" step="0.001" value="0.02" />
            </div>

            <div class="control-group">
              <label>水波纹理 <span class="control-value" id="rippleValue">0.1</span></label>
              <input type="range" id="rippleEffect" min="0" max="0.5" step="0.01" value="0.1" />
            </div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-index">04</div>
          <div class="section-body">
            <h4>外观</h4>
            <div class="control-group">
              <label>背景模糊 <span class="control-value" id="blurValue">2.0</span></label>
              <input type="range" id="blurRadius" min="1" max="15" step="0.5" value="2.0" />
            </div>

            <div class="control-group">
              <label>玻璃染色透明度 <span class="control-value" id="tintValue">0.0</span></label>
              <input type="range" id="tintOpacity" min="0" max="1.0" step="0.01" value="0" />
            </div>

            <div class="control-group">
              <label><input type="checkbox" id="warpToggle" /> 开启中心扭曲</label>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-index">05</div>
          <div class="section-body">
            <h4>操作</h4>
            <div class="control-group">
              <label><input type="checkbox" id="hideButtonsToggle" /> 隐藏形状预览</label>
            </div>

            <div class="control-group control-group-button">
              <button id="randomizeButton" class="randomize-button">随机玻璃效果</button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="container.js"></script>
    <script src="button.js"></script>
    <script src="controls.js"></script>
    <script src="app.js"></script>
  </body>
</html>
